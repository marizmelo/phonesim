<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhoneSim</title>
  <link rel="stylesheet" href="css/phone.css">
  <link rel="stylesheet" href="css/statusbar.css">
  <link rel="stylesheet" href="css/homescreen.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/browser.css">
</head>
<body>
  <div id="phone-frame">
    <!-- Drag area at top of phone -->
    <div id="drag-area"></div>

    <!-- Close button -->
    <button id="close-btn" title="Close">&times;</button>

    <!-- iPhone notch -->
    <div id="notch">
      <div id="notch-camera"></div>
    </div>

    <!-- Android punch hole -->
    <div id="punch-hole"></div>

    <!-- Phone screen -->
    <div id="phone-screen">
      <!-- Status bar -->
      <div id="status-bar">
        <div id="status-left">
          <span id="status-time">9:41</span>
        </div>
        <div id="status-right">
          <svg id="status-signal" width="17" height="12" viewBox="0 0 17 12">
            <rect x="0" y="9" width="3" height="3" rx="0.5" fill="currentColor"/>
            <rect x="4.5" y="6" width="3" height="6" rx="0.5" fill="currentColor"/>
            <rect x="9" y="3" width="3" height="9" rx="0.5" fill="currentColor"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
          </svg>
          <svg id="status-wifi" width="16" height="12" viewBox="0 0 16 12">
            <path d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="currentColor" transform="translate(0,-2)"/>
            <path d="M4.5 8.5C5.5 7.2 6.7 6.5 8 6.5s2.5.7 3.5 2" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M1.5 5.5C3.5 3 5.6 1.5 8 1.5s4.5 1.5 6.5 4" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div id="status-battery">
            <div id="battery-body">
              <div id="battery-level"></div>
            </div>
            <div id="battery-tip"></div>
          </div>
        </div>
      </div>

      <!-- Screen content area -->
      <div id="screen-content">
        <!-- Home Screen -->
        <div id="view-homescreen" class="view active">
          <div id="homescreen-wallpaper"></div>
          <div id="app-grid">
            <div class="app-icon" data-app="settings">
              <div class="app-icon-image settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                  <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                  <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 008.43 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.43a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
              </div>
              <span class="app-label">Settings</span>
            </div>
            <div class="app-icon" data-app="browser">
              <div class="app-icon-image browser-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M2 12h20"/>
                  <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                </svg>
              </div>
              <span class="app-label">Browser</span>
            </div>
          </div>
          <!-- iOS dock -->
          <div id="dock"></div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view">
          <div class="app-header">
            <button class="back-btn" data-back="homescreen">
              <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
                <path d="M10 2L2 10L10 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <h1>Settings</h1>
          </div>
          <div class="settings-content">
            <div class="settings-group">
              <div class="settings-group-title">Phone Design</div>
              <div class="settings-list" id="design-list">
                <!-- Populated by settings.js -->
              </div>
            </div>
          </div>
        </div>

        <!-- Browser View -->
        <div id="view-browser" class="view">
          <div id="browser-header">
            <button class="back-btn" data-back="homescreen">
              <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
                <path d="M10 2L2 10L10 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="url-bar">
              <input id="url-input" type="text" placeholder="Search or enter URL" spellcheck="false">
              <button id="url-go">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="browser-content">
            <webview id="browser-webview" src="about:blank" allowpopups></webview>
          </div>
        </div>
      </div>

      <!-- Home indicator (iOS) -->
      <div id="home-indicator">
        <div id="home-indicator-bar"></div>
      </div>

      <!-- Android nav bar -->
      <div id="nav-bar">
        <button class="nav-btn" id="nav-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="nav-btn" id="nav-home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="8"/>
          </svg>
        </button>
        <button class="nav-btn" id="nav-recents">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="12" height="12" rx="1"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Side buttons -->
    <div id="side-btn-power"></div>
    <div id="side-btn-vol-up"></div>
    <div id="side-btn-vol-down"></div>
  </div>

  <script src="js/phone-designs.js"></script>
  <script src="js/statusbar.js"></script>
  <script src="js/homescreen.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/browser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
