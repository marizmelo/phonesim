<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="50%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0.3" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7f5af0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2cb67d" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- App icon rounded rect background -->
  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle radial glow -->
    <ellipse cx="512" cy="400" rx="500" ry="400" fill="url(#glow)"/>

    <!-- Phone body -->
    <rect x="312" y="142" width="400" height="740" rx="52" ry="52" fill="url(#frame)" stroke="#555" stroke-width="3"/>

    <!-- Phone screen -->
    <rect x="332" y="196" width="360" height="632" rx="8" ry="8" fill="url(#screen)"/>

    <!-- Screen glow overlay -->
    <rect x="332" y="196" width="360" height="632" rx="8" ry="8" fill="url(#glow)" opacity="0.5"/>

    <!-- Notch -->
    <rect x="432" y="152" width="160" height="32" rx="16" ry="16" fill="#1a1a2e"/>
    <circle cx="512" cy="168" r="6" fill="#2a2a3a"/>

    <!-- Home indicator -->
    <rect x="452" y="848" width="120" height="5" rx="2.5" ry="2.5" fill="rgba(255,255,255,0.3)"/>

    <!-- Screen content: mini app icons -->
    <!-- Row 1 -->
    <rect x="370" y="260" width="56" height="56" rx="14" fill="#0a84ff" opacity="0.9"/>
    <rect x="448" y="260" width="56" height="56" rx="14" fill="#30d158" opacity="0.9"/>
    <rect x="526" y="260" width="56" height="56" rx="14" fill="#ff6b6b" opacity="0.9"/>
    <rect x="604" y="260" width="56" height="56" rx="14" fill="#ffd60a" opacity="0.9"/>

    <!-- Row 2 -->
    <rect x="370" y="340" width="56" height="56" rx="14" fill="#bf5af2" opacity="0.9"/>
    <rect x="448" y="340" width="56" height="56" rx="14" fill="#ff9f0a" opacity="0.9"/>
    <rect x="526" y="340" width="56" height="56" rx="14" fill="#64d2ff" opacity="0.9"/>
    <rect x="604" y="340" width="56" height="56" rx="14" fill="#ff375f" opacity="0.9"/>

    <!-- Dock bar -->
    <rect x="348" y="740" width="328" height="72" rx="20" ry="20" fill="rgba(255,255,255,0.08)"/>

    <!-- Dock icons -->
    <rect x="378" y="752" width="48" height="48" rx="12" fill="rgba(255,255,255,0.15)"/>
    <rect x="450" y="752" width="48" height="48" rx="12" fill="rgba(255,255,255,0.15)"/>
    <rect x="522" y="752" width="48" height="48" rx="12" fill="rgba(255,255,255,0.15)"/>
    <rect x="594" y="752" width="48" height="48" rx="12" fill="rgba(255,255,255,0.15)"/>

    <!-- Side buttons -->
    <rect x="305" y="310" width="7" height="60" rx="3" fill="#3a3a4a"/>
    <rect x="305" y="390" width="7" height="60" rx="3" fill="#3a3a4a"/>
    <rect x="712" y="340" width="7" height="80" rx="3" fill="#3a3a4a"/>
  </g>
</svg>